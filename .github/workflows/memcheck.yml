jobs:
  memcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y valgrind cmake bison flex
      - name: Build
        run: |
	  cmake .
	  make
      - name: Run Valgrind
        run: valgrind --leak-check=full --error-exitcode=1 ./dgasm -t eclipse_s140 -f octal tests/hello.s
