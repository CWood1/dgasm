name: "Fuzzing (AFL++)"

on:
  pull_request:
  push:
    branches:
      - 'release-*'

jobs:
  fuzz:
    runs-on: ubuntu-latest
    container:
      image: aflplusplus/aflplusplus

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y afl++ cmake make clang bison flex

      - name: Configure (AFL + ASan)
        run: |
          CC=afl-clang-fast \
          cmake -S . -B build-afl

      - name: Build
        run: cmake --build build-afl

      - name: Prepare seed corpus
        run: |
          mkdir -p fuzz/corpus
          
          # Minimal valid input
          cat <<EOF > fuzz/corpus/minimal.s
          LEF 0, 0
          EOF

          # Expression test
          cat <<EOF > fuzz/corpus/expression.s
          LEF 1, 1+2
          EOF

          # Directive test
          cat <<EOF > fuzz/corpus/directive.s
          org 100
          LEF 0, 0
          EOF

      - name: Run AFL (smoke test)
        run: |
          mkdir -p fuzz/out
          
          afl-fuzz \
            -i fuzz/corpus \
            -o fuzz/out \
            -V 15 \
            -- ./build-afl/dgasm -t eclipse_s140 -f octal @@

      - name: Check for crashes
        run: |
          if [ -d fuzz/out/default/crashes ] && [ "$(ls -A fuzz/out/default/crashes)" ]; then
            echo "❌ Crashes found!"
            ls -l fuzz/out/default/crashes
            exit 1
          else
            echo "✅ No crashes found"
          fi

      - name: Upload crashes (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: afl-crashes
          path: fuzz/out/default/crashes
